document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

44,145,0.12); }\n  input[type=checkbox], input[type=radio] { width: 18px; height: 18px; accent-color: #6A2C91; cursor: pointer; flex-shrink: 0; }\n  ::placeholder { color: #aaa2b3; }\n  select { appearance: none; -webkit-appearance: none; background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236A2C91' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/><\u002Fsvg>\"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 38px; cursor: pointer; }\n  @media print {\n    body { background: #fff; }\n    .if-nav, .if-actionsbar { display: none !important; }\n    .if-grid { grid-template-columns: 1fr !important; }\n    .if-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100%;\">\n\n  <!-- HERO -->\n  <header style=\"background:linear-gradient(135deg,#6A2C91 0%,#3a2f7a 55%,#2E4372 100%);color:#fff;padding:48px 24px 56px;\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap;\">\n      <div style=\"background:#fff;border-radius:20px;padding:14px;box-shadow:0 12px 32px rgba(0,0,0,0.18);flex-shrink:0;\">\n        <img src=\"63c6d5dd-e59d-4048-85ad-69c2d4907d36\" alt=\"Improving Futures\" style=\"width:118px;height:118px;object-fit:contain;display:block;border-radius:10px;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:280px;\">\n        <div style=\"display:inline-block;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#D9C7E8;background:rgba(255,255,255,0.12);padding:6px 14px;border-radius:999px;margin-bottom:14px;\">Job Application<\u002Fdiv>\n        <h1 style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:38px;line-height:1.1;margin:0 0 10px;\">Community Support &amp; Wellbeing Companion<\u002Fh1>\n        <p style=\"font-size:16px;line-height:1.55;color:#E7DDF1;margin:0 0 18px;max-width:620px;\">Help people live fuller, happier and more independent lives. Tell us about yourself — every section helps us understand the person behind the application.<\u002Fp>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;background:rgba(255,255,255,0.12);padding:7px 14px;border-radius:999px;font-family:'Open Sans',sans-serif;\">Flexible Zero-Hours<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;background:rgba(255,255,255,0.12);padding:7px 14px;border-radius:999px;\">Warwickshire, Coventry &amp; West Northants<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;background:rgba(255,255,255,0.12);padding:7px 14px;border-radius:999px;\">Reports to: Director<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1080px;margin:26px auto 0;padding-top:22px;border-top:1px solid rgba(255,255,255,0.18);font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.3px;color:#E7DDF1;\">\n      Heard. <span style=\"color:#fff;\">Understood.<\u002Fspan> Supported. <span style=\"color:#C8AEDC;font-weight:500;font-style:italic;\">It's your journey.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <!-- CONFIRMATION -->\n    <div style=\"max-width:640px;margin:0 auto;padding:80px 24px;text-align:center;\">\n      <div style=\"width:84px;height:84px;border-radius:50%;background:#EAF4EC;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;\">\n        <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F8A5B\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 size:13px;color:#6A2C91;margin-bottom:16px;\">Professional reference (current or most recent employer)<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;\">\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Name<\u002Flabel><input type=\"text\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Organisation<\u002Flabel><input type=\"text\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Job title<\u002Flabel><input type=\"text\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Telephone<\u002Flabel><input type=\"tel\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Email<\u002Flabel><input type=\"email\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Relationship to you<\u002Flabel><input type=\"text\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FAF7FC;border:1px solid #EEE7F4;border-radius:14px;padding:22px;\">\n            <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#6A2C91;margin-bottom:16px;\">Character reference<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;\">\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Name<\u002Flabel><input type=\"text\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Occupation<\u002Flabel><input type=\"text\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Telephone<\u002Flabel><input type=\"tel\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Email<\u002Flabel><input type=\"email\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Relationship to you<\u002Flabel><input type=\"text\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SECTION 12 -->\n      <sc-if value=\"{{ showEquality }}\" hint-placeholder-val=\"{{ true }}\">\n      <section id=\"sec-12\" data-screen-label=\"Equality &amp; Diversity\" class=\"if-card\" style=\"background:#fff;border-radius:18px;padding:32px;border:1px solid #EEE7F4;box-shadow:0 2px 16px rgba(106,44,145,0.05);\">\n        <header style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px;\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:#6A2C91;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;flex-shrink:0;\">12<\u002Fdiv>\n          <div><h2 style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:21px;color:#6A2C91;margin:0;\">Equality &amp; Diversity Monitoring<\u002Fh2><p style=\"margin:2px 0 0;font-size:13.5px;color:#8a8294;\">Optional &amp; confidential. Used only for monitoring, never for selection.<\u002Fp><\u002Fdiv>\n        <\u002Fheader>\n        <div class=\"if-grid\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:18px;\">\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Age group<\u002Flabel><select><option value=\"\">Prefer not to say<\u002Foption><option>18–24<\u002Foption><option>25–34<\u002Foption><option>35–44<\u002Foption><option>45–54<\u002Foption><option>55–64<\u002Foption><option>65+<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Gender<\u002Flabel><select><option value=\"\">Prefer not to say<\u002Foption><option>Female<\u002Foption><option>Male<\u002Foption><option>Non-binary<\u002Foption><option>Self-describe<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Disability<\u002Flabel><select><option value=\"\">Prefer not to say<\u002Foption><option>Yes<\u002Foption><option>No<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Ethnicity<\u002Flabel><input type=\"text\" placeholder=\"Optional\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Religion or belief<\u002Flabel><input type=\"text\" placeholder=\"Optional\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Recruitment source<\u002Flabel><input type=\"text\" placeholder=\"Where you saw this role\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:18px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Reasonable adjustments required (interview or role)<\u002Flabel><textarea placeholder=\"Let us know if there's anything we can do to support you.\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- SECTION 13 -->\n      <section id=\"sec-13\" data-screen-label=\"Declaration\" class=\"if-card\" style=\"background:#fff;border-radius:18px;padding:32px;border:1px solid #EEE7F4;box-shadow:0 2px 16px rgba(106,44,145,0.05);\">\n        <header style=\"display:flex;align-items:center;gap:14px;margin-bottom:24px;\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:#6A2C91;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;flex-shrink:0;\">13<\u002Fdiv>\n          <div><h2 style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:21px;color:#6A2C91;margin:0;\">Applicant Declaration<\u002Fh2><\u002Fdiv>\n        <\u002Fheader>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:24px;\">\n          <label style=\"display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#444;line-height:1.5;cursor:pointer;\"><input type=\"checkbox\" required=\"\" style=\"margin-top:2px;\"> <span>I confirm that the information provided in this application is true and accurate to the best of my knowledge.<\u002Fspan><\u002Flabel>\n          <label style=\"display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#444;line-height:1.5;cursor:pointer;\"><input type=\"checkbox\" required=\"\" style=\"margin-top:2px;\"> <span>I understand that references and an Enhanced DBS check will be undertaken if my application is successful.<\u002Fspan><\u002Flabel>\n          <label style=\"display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#444;line-height:1.5;cursor:pointer;\"><input type=\"checkbox\" required=\"\" style=\"margin-top:2px;\"> <span>I consent to my personal information being processed for recruitment purposes in accordance with data protection legislation.<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"if-grid\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;\">\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Full Name <span style=\"color:#6A2C91;\">*<\u002Fspan><\u002Flabel><input type=\"text\" required=\"\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Signature (type your name) <span style=\"color:#6A2C91;\">*<\u002Fspan><\u002Flabel><input type=\"text\" required=\"\" style=\"font-family:'Poppins',sans-serif;font-style:italic;\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\"><label style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#2E4372;\">Date <span style=\"color:#6A2C91;\">*<\u002Fspan><\u002Flabel><input type=\"date\" required=\"\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ACTIONS -->\n      <div class=\"if-actionsbar\" style=\"display:flex;flex-direction:column;gap:14px;padding:8px 4px 0;\">\n        <sc-if value=\"{{ sendError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:flex-start;gap:10px;background:#FCEEEE;border:1px solid #F1C9C9;border-radius:10px;padding:14px 16px;font-size:13.5px;color:#a13b3b;line-height:1.5;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c0392b\" stroke-width=\"2.2\" style=\"flex-shrink:0;margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg>\n            <span>{{ sendError }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;\">\n          <p style=\"font-size:13px;color:#8a8294;margin:0;max-width:440px;line-height:1.5;\">By submitting, you agree to Improving Futures Ltd processing your details for recruitment. Your application is sent securely to our team.<\u002Fp>\n          <button type=\"submit\" disabled=\"{{ sending }}\" style=\"{{ submitBtnStyle }}\" style-hover=\"background:#2E4372;\">{{ submitLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fform>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#2E4372;color:#cdd7ea;text-align:center;padding:28px 24px;font-size:13px;\">\n    <div style=\"font-family:'Poppins',sans-serif;font-weight:600;color:#fff;font-size:14px;margin-bottom:4px;\">Improving Futures Ltd<\u002Fdiv>\n    Heard. Understood. Supported. It's your journey.\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;900px&quot;},&quot;recipientEmail&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;support@improvingfutures.co.uk&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Submissions&quot;,&quot;label&quot;:&quot;Send applications to&quot;},&quot;showScenario&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;,&quot;label&quot;:&quot;Show scenario questions&quot;},&quot;showEquality&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;,&quot;label&quot;:&quot;Show equality monitoring&quot;},&quot;submitMessage&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Thank you for taking the time to apply to Improving Futures Ltd. We review every application personally and will be in touch with you soon.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;,&quot;label&quot;:&quot;Confirmation message&quot;}}\">\nclass Component extends DCLogic {\n  state = { submitted: false, active: 'sec-1', sending: false, sendError: '' };\n\n  radioQuestions = {\n    rtw: 'Right to work in the UK',\n    licence: 'Holds a full UK driving licence',\n    vehicle: 'Access to a reliable vehicle',\n    usevehicle: 'Willing to use own vehicle for work',\n    zerohours: 'Happy to work zero-hours',\n    holcover: 'Can provide holiday cover',\n    sickcover: 'Can provide sickness cover',\n    dbs: 'Holds Enhanced Adult DBS',\n    updatesvc: 'DBS on Update Service',\n    dismissed: 'Ever dismissed from a care role',\n    safeguard: 'Ever subject to safeguarding investigation',\n  };\n\n  buildPayload(form) {\n    const data = {};\n    // Text-like fields, paired with their label\n    form.querySelectorAll('input[type=text],input[type=email],input[type=tel],input[type=date],input[type=number],select,textarea').forEach((el) => {\n      const v = (el.value || '').trim();\n      if (!v) return;\n      const wrap = el.closest('div');\n      const lab = wrap ? wrap.querySelector('label') : null;\n      let key = lab ? lab.textContent.replace('*', '').trim() : (el.placeholder || 'Field');\n      const sec = el.closest('section');\n      const h = sec ? sec.querySelector('h2') : null;\n      if (h) key = h.textContent.trim() + ' — ' + key;\n      data[key] = data[key] ? data[key] + ' / ' + v : v;\n    });\n    // Radio groups\n    Object.entries(this.radioQuestions).forEach(([name, q]) => {\n      const c = form.querySelector('input[name=\"' + name + '\"]:checked');\n      if (c) data[q] = (c.closest('label').textContent || '').trim();\n    });\n    // Area & experience checkbox groups\n    const collect = (name) => [...form.querySelectorAll('input[name=\"' + name + '\"]:checked')].map((c) => c.value);\n    const areas = collect('area');\n    if (areas.length) data['Areas willing to work'] = areas.join(', ');\n    const exp = collect('experience');\n    if (exp.length) data['Experience supporting'] = exp.join(', ');\n    // Availability grid\n    const slots = { am: 'Morning', pm: 'Afternoon', eve: 'Evening' };\n    const dayNames = { mon: 'Mon', tue: 'Tue', wed: 'Wed', thu: 'Thu', fri: 'Fri', sat: 'Sat', sun: 'Sun' };\n    const avail = [];\n    Object.keys(dayNames).forEach((d) => {\n      const got = Object.keys(slots).filter((s) => form.querySelector('input[name=\"avail-' + d + '-' + s + '\"]:checked'));\n      if (got.length) avail.push(dayNames[d] + ': ' + got.map((s) => slots[s]).join(', '));\n    });\n    if (avail.length) data['Availability'] = avail.join('  |  ');\n    return data;\n  }\n\n  sections = [\n    { id: 'sec-1', num: '01', title: 'Personal Details' },\n    { id: 'sec-2', num: '02', title: 'Position' },\n    { id: 'sec-3', num: '03', title: 'Qualifications' },\n    { id: 'sec-4', num: '04', title: 'Driving & Travel' },\n    { id: 'sec-5', num: '05', title: 'Availability' },\n    { id: 'sec-6', num: '06', title: 'Employment' },\n    { id: 'sec-7', num: '07', title: 'Experience' },\n    { id: 'sec-8', num: '08', title: 'Scenarios' },\n    { id: 'sec-9', num: '09', title: 'Personal Statement' },\n    { id: 'sec-10', num: '10', title: 'DBS & Safeguarding' },\n    { id: 'sec-11', num: '11', title: 'References' },\n    { id: 'sec-12', num: '12', title: 'Equality' },\n    { id: 'sec-13', num: '13', title: 'Declaration' },\n  ];\n\n  componentDidMount() {\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) this.setState({ active: e.target.id }); });\n    }, { rootMargin: '-15% 0px -75% 0px', threshold: 0 });\n    this.sections.forEach((s) => {\n      const el = document.getElementById(s.id);\n      if (el) this._io.observe(el);\n    });\n  }\n\n  componentWillUnmount() { if (this._io) this._io.disconnect(); }\n\n  smoothScroll = (targetY) => {\n    const startY = window.scrollY;\n    const dist = targetY - startY;\n    const dur = 380;\n    let t0 = null;\n    const step = (ts) => {\n      if (t0 === null) t0 = ts;\n      const p = Math.min(1, (ts - t0) / dur);\n      const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;\n      window.scrollTo(0, startY + dist * ease);\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  };\n\n  scrollTo = (id) => () => {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 20;\n    this.smoothScroll(y);\n  };\n\n  submit = (e) => {\n    e.preventDefault();\n    if (this.state.sending) return;\n    const form = e.target;\n    const email = this.props.recipientEmail ?? 'support@improvingfutures.co.uk';\n    const payload = this.buildPayload(form);\n    const applicant = payload['Personal Details — Full Name'] || 'New applicant';\n    const body = {\n      _subject: 'New application — Community Support & Wellbeing Companion (' + applicant + ')',\n      _template: 'table',\n      _captcha: 'false',\n      ...payload,\n    };\n    this.setState({ sending: true, sendError: '' });\n    fetch('https://formsubmit.co/ajax/' + encodeURIComponent(email), {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n      body: JSON.stringify(body),\n    })\n      .then((r) => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })\n      .then(() => {\n        this.setState({ submitted: true, sending: false });\n        this.smoothScroll(0);\n      })\n      .catch(() => {\n        this.setState({ sending: false, sendError: \"We couldn't send your application just now. Please check your connection and try again, or email your details directly to support@improvingfutures.co.uk.\" });\n      });\n  };\n\n  reset = () => this.setState({ submitted: false, active: 'sec-1', sending: false, sendError: '' });\n\n  renderVals() {\n    const baseLink = \"display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:pointer;font-family:'Open Sans',sans-serif;font-size:13.5px;text-align:left;border:none;width:100%;transition:all .15s;\";\n    const baseDot = \"width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:600;flex-shrink:0;\";\n    const navItems = this.sections.map((s) => {\n      const on = this.state.active === s.id;\n      return {\n        ...s,\n        onClick: this.scrollTo(s.id),\n        lstyle: baseLink + (on ? 'background:rgba(106,44,145,0.08);color:#6A2C91;font-weight:600;' : 'background:transparent;color:#6b6577;font-weight:400;'),\n        dstyle: baseDot + (on ? 'background:#6A2C91;color:#fff;' : 'background:#EFEAF4;color:#9a8fb0;'),\n      };\n    });\n\n    const days = [\n      { key: 'mon', label: 'Monday' },\n      { key: 'tue', label: 'Tuesday' },\n      { key: 'wed', label: 'Wednesday' },\n      { key: 'thu', label: 'Thursday' },\n      { key: 'fri', label: 'Friday' },\n      { key: 'sat', label: 'Saturday' },\n      { key: 'sun', label: 'Sunday' },\n    ];\n\n    const areas = ['Coventry', 'Rugby', 'Warwick', 'Leamington Spa', 'Stratford-upon-Avon', 'Daventry', 'Weedon', 'Flore', 'Nether Heyford', 'Northampton', 'Towcester', 'Southam'];\n    const experience = ['Older adults', 'Dementia', 'Learning disabilities', 'Autism', 'ADHD', 'Mental health', 'Physical disabilities', \"Parkinson's\", 'Community support', 'Advocacy'];\n\n    const btnBase = \"font-family:'Poppins',sans-serif;font-weight:600;font-size:16px;color:#fff;border:none;border-radius:12px;padding:15px 38px;box-shadow:0 8px 22px rgba(106,44,145,0.28);transition:background .15s;\";\n    const sending = this.state.sending;\n\n    return {\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      sending,\n      sendError: this.state.sendError,\n      submitLabel: sending ? 'Sending…' : 'Submit application',\n      submitBtnStyle: btnBase + (sending ? 'background:#9a7cb3;cursor:wait;' : 'background:#6A2C91;cursor:pointer;'),\n      onSubmit: this.submit,\n      reset: this.reset,\n      navItems,\n      days,\n      areas,\n      experience,\n      showEquality: this.props.showEquality ?? true,\n      showScenario: this.props.showScenario ?? true,\n      submitMessage: this.props.submitMessage ?? \"Thank you for taking the time to apply to Improving Futures Ltd. We review every application personally and will be in touch with you soon.\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
